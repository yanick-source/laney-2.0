<!DOCTYPE html>
<html>
<head>
    <title>Gemini API Test</title>
    <script type="module">
        // Test the new API key
        const apiKey = 'AIzaSyD4Te-hEsqbFNEgOuIIcyV58mJ07wFAiQ0';
        
        async function testGeminiAPI() {
            console.log('🔄 Testing Gemini API...');
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash:generateContent?key=${apiKey}`;
            
            const body = {
                contents: [{
                    role: "user",
                    parts: [{ text: "Respond with exactly: 'API working'" }]
                }],
                generationConfig: {
                    maxOutputTokens: 10,
                    temperature: 0.1
                }
            };
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                }
                
                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response';
                
                console.log('✅ API Test Result:', text);
                document.getElementById('result').textContent = `✅ Success: ${text}`;
                document.getElementById('result').style.color = 'green';
                
            } catch (error) {
                console.error('❌ API Test Failed:', error);
                document.getElementById('result').textContent = `❌ Error: ${error.message}`;
                document.getElementById('result').style.color = 'red';
            }
        }
        
        // Run test when page loads
        testGeminiAPI();
    </script>
</head>
<body>
    <h1>Gemini API Test</h1>
    <p>Testing new API key...</p>
    <div id="result">Loading...</div>
</body>
</html>
